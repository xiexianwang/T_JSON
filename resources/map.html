<!DOCTYPE html>


<html>

<head>


<meta charset="utf-8"/>

<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<link rel="stylesheet" href="qrc:///leaflet.css"/>

<style>


* { margin:0; padding:0; }

html, body, #map { width:100%; height:100%; font-family:"Microsoft YaHei",sans-serif; }

#deviceInfo {

    position:absolute; top:10px; left:10px; z-index:999;
    
    background:rgba(0,0,0,0.7); color:#eee;
    
    font-size:12px; line-height:1.6; padding:8px 12px;
    
    border-radius:4px; border:1px solid rgba(255,255,255,0.15);
    
    min-width:200px; pointer-events:none;

}

#deviceInfo .label { color:#999; }

#deviceInfo .val  { color:#fff; font-weight:bold; }

#deviceInfo .row  { white-space:nowrap; }

</style>

</head>

<body>

<div id="map"></div>

<div id="deviceInfo">


    <div class="row"><span class="label">经纬度: </span><span class="val" id="infoLatLon">--</span></div>
    
    <div class="row"><span class="label">高度: </span><span class="val" id="infoAlt">--</span><span class="label"> 距离: </span><span class="val" id="infoRange">--</span></div>
    
    <div class="row"><span class="label">方位角: </span><span class="val" id="infoPan">--</span><span class="label"> 俯仰角: </span><span class="val" id="infoTilt">--</span></div>
    
    <div class="row"><span class="label">视场角(H×V): </span><span class="val" id="infoFov">--</span></div>

</div>

<script src="qrc:///leaflet.js"></script>

<script src="qrc:///qtwebchannel/qwebchannel.js"></script>

<script>


// ======================================================================

// ---- 地图初始化 ----

// ======================================================================

var map = L.map('map', {

    center: [0, 0],
    
    zoom: 17,
    
    zoomControl: false,
    
    preferCanvas: true, // 【优化】强制使用 Canvas 渲染，防止缩放图层错位
    
    zoomAnimation: true

});



// 街道底图：OpenStreetMap 标准瓦片

var streetLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {

    maxZoom: 19,
    
    attribution: '© <a href="https://openstreetmap.org/copyright">OSM</a>'

});



// 卫星底图：ESRI World Imagery

var satelliteLayer = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {

    maxZoom: 19,
    
    attribution: '© <a href="https://esri.com">Esri</a>'

});



// 当前底图容器（用于切换）

var currentLayer = satelliteLayer.addTo(map);



// 首次定位标记

var firstCentered = false;



// ---- 设备位置标记 ----

// 【优化】废弃 L.marker，改用纯 Canvas 渲染的 L.circleMarker，保证缩放绝对同心

var deviceMarker = L.circleMarker([0, 0], {

    radius: 10,
    
    color: 'rgba(255,255,255,0.8)',
    
    weight: 2,
    
    fillColor: '#ff4444',
    
    fillOpacity: 1

}).addTo(map);



// ---- 识别范围指示圆 ----

var visCircle = L.circle([0, 0], {

    radius: 4000,
    
    fillColor: '#3388ff',
    
    fillOpacity: 0.5,
    
    weight: 0

});



var irCircle = L.circle([0, 0], {

    radius: 2000,
    
    fillColor: '#ff4444',
    
    fillOpacity: 0.5,
    
    weight: 0

});



// ---- 视场角多边形 ----

var visFovLayer = L.polygon([], {

    fillColor: '#3388ff',
    
    fillOpacity: 1

});



var irFovLayer = L.polygon([], {

    fillColor: '#ff4444',
    
    fillOpacity: 1

});



// ---- 轨迹容器 ----

var trackPolylines = {};

var trackEndMarkers = {};



// ---- 目标容器 ----

// 【优化】改为字典结构，通过目标 ID 索引，大幅提升高频更新性能

var targetMarkers = {};

var targetBboxes = {};



// ---- 信息弹窗 ----

var infoPopup = null;



// ---- 默认图标（用于轨迹端点） ----

var dotIcon = L.divIcon({

    className: '',
    
    html: '<div style="background:#44aaff;border:2px solid #fff;border-radius:50%;width:10px;height:10px;box-shadow:0 0 4px rgba(0,100,255,0.5);"></div>',
    
    iconSize: [14, 14],
    
    iconAnchor: [7, 7]

});



// ======================================================================

// ---- 辅助函数：计算 FOV 扇形顶点 ----

// ======================================================================

function computeFovCorners(lat, lon, panDeg, tiltDeg, hfovDeg, vfovDeg, rangeM) {

    if (rangeM <= 0) return [];
    
    var R = 6371000;
    
    var latR = lat * Math.PI / 180, lonR = lon * Math.PI / 180;
    
    var panR = panDeg * Math.PI / 180;
    
    var halfH = hfovDeg / 2 * Math.PI / 180;
    
    var corners = [];
    
    for (var i = -1; i <= 1; i += 2) {
    
        for (var j = -1; j <= 1; j += 2) {
    
            var brg = panR + i * halfH;
    
            var d = rangeM / R;
    
            var clat = Math.asin(Math.sin(latR) * Math.cos(d)
    
                       + Math.cos(latR) * Math.sin(d) * Math.cos(brg));
    
            var clon = lonR + Math.atan2(
    
                Math.sin(brg) * Math.sin(d) * Math.cos(latR),
    
                Math.cos(d) - Math.sin(latR) * Math.sin(clat));
    
            corners.push([clat * 180 / Math.PI, clon * 180 / Math.PI]);
    
        }
    
    }
    
    corners.push([lat, lon]);
    
    return corners;

}



// ---- QWebChannel 桥接 ----

var bridge = null;

new QWebChannel(qt.webChannelTransport, function(channel) {

    bridge = channel.objects.bridge;
    
    if (bridge && bridge.onMapInitialized) {
    
        bridge.onMapInitialized();
    
    }

});



// ======================================================================

// ---- C++ 调用的 JS API ----

// ======================================================================



function jsSetDevicePos(lat, lon) {

    var ll = [lat, lon];
    
    deviceMarker.setLatLng(ll);
    
    visCircle.setLatLng(ll);
    
    irCircle.setLatLng(ll);
    
    if (!map.hasLayer(visCircle)) { visCircle.addTo(map); irCircle.addTo(map); }
    
    if (!firstCentered) {
    
        map.setView(ll, map.getZoom());
    
        firstCentered = true;
    
    }
    
    deviceMarker.bringToFront(); // 【优化】保证中心原点永远在最顶层

}



function jsSetDeviceInfo(lat, lon, alt, pan, tilt, hfov, vfov, range) {

    document.getElementById('infoLatLon').textContent = lat.toFixed(5) + ', ' + lon.toFixed(5);
    
    document.getElementById('infoAlt').textContent = alt > 0 ? alt.toFixed(1) + ' m' : '--';
    
    document.getElementById('infoRange').textContent = range > 0 ? range.toFixed(0) + ' m' : '--';
    
    document.getElementById('infoPan').textContent = pan.toFixed(1) + '\u00B0';
    
    document.getElementById('infoTilt').textContent = tilt.toFixed(1) + '\u00B0';
    
    if (hfov > 0 && vfov > 0)
    
        document.getElementById('infoFov').textContent = hfov.toFixed(1) + '\u00B0 \u00D7 ' + vfov.toFixed(1) + '\u00B0';

}



function jsSetVisFov(lat, lon, panDeg, tiltDeg, hfovDeg, vfovDeg, rangeM) {

    var pts = computeFovCorners(lat, lon, panDeg, tiltDeg, hfovDeg, vfovDeg, rangeM);
    
    if (pts.length > 0) {
    
        visFovLayer.setLatLngs(pts);
    
        if (!map.hasLayer(visFovLayer)) visFovLayer.addTo(map);
    
    } else {
    
        if (map.hasLayer(visFovLayer)) map.removeLayer(visFovLayer);
    
    }

}



function jsSetIrFov(lat, lon, panDeg, tiltDeg, hfovDeg, vfovDeg, rangeM) {

    var pts = computeFovCorners(lat, lon, panDeg, tiltDeg, hfovDeg, vfovDeg, rangeM);
    
    if (pts.length > 0) {
    
        irFovLayer.setLatLngs(pts);
    
        if (!map.hasLayer(irFovLayer)) irFovLayer.addTo(map);
    
    } else {
    
        if (map.hasLayer(irFovLayer)) map.removeLayer(irFovLayer);
    
    }

}



function jsClearFov() {

    if (map.hasLayer(visFovLayer)) map.removeLayer(visFovLayer);
    
    if (map.hasLayer(irFovLayer)) map.removeLayer(irFovLayer);

}



function jsAddTrackPoint(trackId, lat, lon) {

    var ll = [lat, lon];
    
    if (!trackPolylines[trackId]) {
    
        trackPolylines[trackId] = L.polyline([], {
    
            color: '#ff4444',
    
            weight: 3,
    
            opacity: 0.8
    
        }).addTo(map);
    
        trackEndMarkers[trackId] = L.marker(ll, {
    
            icon: dotIcon,
    
            zIndexOffset: 500
    
        }).addTo(map);
    
    }
    
    trackPolylines[trackId].addLatLng(ll);
    
    trackEndMarkers[trackId].setLatLng(ll);

}



function jsClearTrack(trackId) {

    if (trackPolylines[trackId]) { map.removeLayer(trackPolylines[trackId]); delete trackPolylines[trackId]; }
    
    if (trackEndMarkers[trackId]) { map.removeLayer(trackEndMarkers[trackId]); delete trackEndMarkers[trackId]; }

}



function jsClearAllTracks() {

    Object.keys(trackPolylines).forEach(function(id) { map.removeLayer(trackPolylines[id]); });
    
    Object.keys(trackEndMarkers).forEach(function(id) { map.removeLayer(trackEndMarkers[id]); });
    
    trackPolylines = {}; trackEndMarkers = {};

}



// 【优化】重写的高频目标更新逻辑，避免销毁重建导致的卡顿

function jsUpdateTargets(jsonStr) {

    var arr = JSON.parse(jsonStr);
    
    var currentIds = {}; // 记录本次上报的目标ID



    arr.forEach(function(t) {
    
        var ll = [t.lat, t.lon];
    
        var color = t.locked ? '#00ff00' : '#ff4444';
    
        currentIds[t.id] = true;



        // 1. 更新或创建中心点
    
        if (targetMarkers[t.id]) {
    
            targetMarkers[t.id].setLatLng(ll);
    
            targetMarkers[t.id].setStyle({ fillColor: color });
    
            targetMarkers[t.id]._targetDist = t.dist;
    
            targetMarkers[t.id]._targetCls = t.cls;
    
        } else {
    
            var m = L.circleMarker(ll, {
    
                radius: 6, fillColor: color, fillOpacity: 0.5, color: '#fff', weight: 1
    
            }).addTo(map);
    
            m._targetId = t.id;
    
            m._targetCls = t.cls;
    
            m._targetDist = t.dist;



            m.on('click', function(e) {
    
                if (infoPopup) map.closePopup(infoPopup);
    
                var content = '<div><b>' + m._targetId + '</b></div>' +
    
                    '<div>Class: ' + m._targetCls + '</div>' +
    
                    '<div>Dist: ' + (m._targetDist || '-') + 'm</div>';
    
                if (t.bbox) {
    
                    content += '<div>BBox: ' + t.bbox.length + ' pts</div>';
    
                }
    
                infoPopup = L.popup({ offset: [0, -10] })
    
                    .setLatLng(e.latlng)
    
                    .setContent(content)
    
                    .openOn(map);
    
            });
    
            targetMarkers[t.id] = m;
    
        }



        // 2. 更新或创建 BBox 多边形
    
        if (t.bbox && t.bbox.length >= 4) {
    
            var valid = t.bbox.filter(function(p) { return p[0] !== 0 && p[1] !== 0; });
    
            if (valid.length >= 3) {
    
                if (targetBboxes[t.id]) {
    
                    targetBboxes[t.id].setLatLngs(valid);
    
                    targetBboxes[t.id].setStyle({ fillColor: color });
    
                } else {
    
                    targetBboxes[t.id] = L.polygon(valid, { fillColor: color, fillOpacity: 0.5, weight: 1 }).addTo(map);
    
                }
    
            }
    
        }
    
    });



    // 3. 性能回收：清理掉那些在本次数据中消失的目标
    
    Object.keys(targetMarkers).forEach(function(id) {
    
        if (!currentIds[id]) {
    
            map.removeLayer(targetMarkers[id]);
    
            delete targetMarkers[id];



            if (targetBboxes[id]) {
    
                map.removeLayer(targetBboxes[id]);
    
                delete targetBboxes[id];
    
            }
    
        }
    
    });

}



function jsSetZoom(level) {

    map.setZoom(level);

}



function jsSetSatelliteMap() {

    if (currentLayer) map.removeLayer(currentLayer);
    
    satelliteLayer.addTo(map);
    
    currentLayer = satelliteLayer;

}



function jsSetStreetMap() {

    if (currentLayer) map.removeLayer(currentLayer);
    
    streetLayer.addTo(map);
    
    currentLayer = streetLayer;

}



// ---- 地图单击事件 ----

map.on('click', function(e) {

    if (bridge && bridge.onMapClick) {
    
        bridge.onMapClick(e.latlng.lat, e.latlng.lng);
    
    }

});

</script>

</body>

</html>
