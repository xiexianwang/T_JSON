<!DOCTYPE html>


<html>

<head>


<meta charset="utf-8"/>

<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<link rel="stylesheet" href="qrc:///leaflet.css"/>

<style>


* { margin:0; padding:0; }

html, body, #map { width:100%; height:100%; font-family:"Microsoft YaHei",sans-serif; }

.deviceInfoContainer {
    background:rgba(0,0,0,0.55);
    backdrop-filter:blur(6px); -webkit-backdrop-filter:blur(6px);
    color:#eee;
    font-size:13px; line-height:1.7;
    padding:10px 14px;
    border-radius:6px;
    border:1px solid rgba(255,255,255,0.12);
    box-shadow:0 2px 12px rgba(0,0,0,0.4);
    min-width:220px;
    user-select:none;
}
.deviceInfoContainer .label { color:#999; }
.deviceInfoContainer .val  { color:#fff; font-weight:bold; }
.deviceInfoContainer .row  { white-space:nowrap; margin:2px 0; }
.deviceInfoContainer .title { font-size:11px; color:#888; letter-spacing:1px; margin-bottom:4px; text-transform:uppercase; }

</style>

</head>

<body>

<div id="map"></div>

<script src="qrc:///leaflet.js"></script>

<script src="qrc:///leaflet-semicircle.js"></script>

<script src="qrc:///qtwebchannel/qwebchannel.js"></script>

<script>



// ======================================================================

// ---- 地图初始化 ----

// ======================================================================

var map = L.map('map', {

    center: [0, 0],

    zoom: 13,

    zoomControl: false,

    preferCanvas: true,

    zoomAnimation: true

});

// 地图缩放变化 → 通知 C++ 侧同步 SpinBox
map.on('zoomend', function() {
    if (typeof bridge !== 'undefined') {
        bridge.onMapZoomChanged(map.getZoom());
    }
});

// Leaflet 控件：设备信息悬浮面板
var DeviceInfoControl = L.Control.extend({
    onAdd: function() {
        var div = L.DomUtil.create('div', 'deviceInfoContainer');
        div.innerHTML = '<div class="title">设备信息</div>'
            + '<div class="row"><span class="label">经纬度: </span><span class="val" id="infoLatLon">--</span></div>'
            + '<div class="row"><span class="label">高度: </span><span class="val" id="infoAlt">--</span><span class="label"> 距离: </span><span class="val" id="infoRange">--</span></div>'
            + '<div class="row"><span class="label">方位角: </span><span class="val" id="infoPan">--</span><span class="label"> 俯仰角: </span><span class="val" id="infoTilt">--</span></div>'
            + '<div class="row"><span class="label">视场角(H×V): </span><span class="val" id="infoFov">--</span></div>';
        L.DomEvent.disableClickPropagation(div);
        return div;
    }
});
new DeviceInfoControl({ position: 'topleft' }).addTo(map);

function jsToggleDeviceInfo(visible) {
    var el = document.querySelector('.deviceInfoContainer');
    if (el) el.style.display = visible ? '' : 'none';
}



// ======================================================================
// ---- 天地图图层初始化 ----
// ======================================================================

var TDT_KEY = 'cb5396445b2686712e74750ad56190aa';
var tdtSubdomains = ['0', '1', '2', '3', '4', '5', '6', '7'];

// 街道图层：矢量底图 + 矢量文字注记
var vecTile = L.tileLayer('https://t{s}.tianditu.gov.cn/DataServer?T=vec_w&x={x}&y={y}&l={z}&tk=' + TDT_KEY, {
    maxZoom: 18, subdomains: tdtSubdomains, attribution: '© 天地图'
});
var cvaTile = L.tileLayer('https://t{s}.tianditu.gov.cn/DataServer?T=cva_w&x={x}&y={y}&l={z}&tk=' + TDT_KEY, {
    maxZoom: 18, subdomains: tdtSubdomains
});
var streetLayer = L.layerGroup([vecTile, cvaTile]);

// 卫星图层：影像底图 + 影像文字注记
var imgTile = L.tileLayer('https://t{s}.tianditu.gov.cn/DataServer?T=img_w&x={x}&y={y}&l={z}&tk=' + TDT_KEY, {
    maxZoom: 18, subdomains: tdtSubdomains, attribution: '© 天地图'
});
var ciaTile = L.tileLayer('https://t{s}.tianditu.gov.cn/DataServer?T=cia_w&x={x}&y={y}&l={z}&tk=' + TDT_KEY, {
    maxZoom: 18, subdomains: tdtSubdomains
});
var satelliteLayer = L.layerGroup([imgTile, ciaTile]);

// 默认加载卫星图
var currentLayer = satelliteLayer.addTo(map);



// 首次定位标记

var firstCentered = false;



// ---- 设备位置标记 ----

// 【优化】废弃 L.marker，改用纯 Canvas 渲染的 L.circleMarker，保证缩放绝对同心

var deviceMarker = L.circleMarker([0, 0], {

    radius: 10,
    
    color: 'rgba(255,255,255,0.8)',
    
    weight: 2,
    
    fillColor: '#ff4444',
    
    fillOpacity: 1

}).addTo(map);



// ---- 识别范围指示圆 ----

var visCircle = L.circle([0, 0], {

    radius: 4000,
    
    fillColor: '#3388ff',
    
    fillOpacity: 0.5,
    
    weight: 0

});



var irCircle = L.circle([0, 0], {

    radius: 2000,
    
    fillColor: '#ff4444',
    
    fillOpacity: 0.5,
    
    weight: 0

});



// ---- 视场角扇形（leaflet-semicircle） ----

var visFovLayer = L.semiCircle([0, 0], {

    radius: 0,

    startAngle: 0,

    stopAngle: 0,

    fillColor: '#3388ff',

    fillOpacity: 0.4

});



var irFovLayer = L.semiCircle([0, 0], {

    radius: 0,

    startAngle: 0,

    stopAngle: 0,

    fillColor: '#ff4444',

    fillOpacity: 0.4

});



// ---- 轨迹容器 ----

var trackPolylines = {};

var trackEndMarkers = {};

var trackLastTimes = {};



// ---- 目标容器 ----

// 【优化】改为字典结构，通过目标 ID 索引，大幅提升高频更新性能

var targetMarkers = {};

var targetBboxes = {};



// ---- 信息弹窗 ----

var infoPopup = null;



// ---- 默认图标（用于轨迹端点） ----

var dotIcon = L.divIcon({

    className: '',
    
    html: '<div style="background:#44aaff;border:2px solid #fff;border-radius:50%;width:10px;height:10px;box-shadow:0 0 4px rgba(0,100,255,0.5);"></div>',
    
    iconSize: [14, 14],
    
    iconAnchor: [7, 7]

});




// ---- 图层叠放顺序辅助（rAF 去抖） ----

var _reorderPending = false;

function reorderLayers() {

    if (_reorderPending) return;

    _reorderPending = true;

    requestAnimationFrame(function() {

        _reorderPending = false;

        if (map.hasLayer(visCircle)) visCircle.bringToFront();
        if (map.hasLayer(visFovLayer)) visFovLayer.bringToFront();
        if (map.hasLayer(irCircle)) irCircle.bringToFront();
        if (map.hasLayer(irFovLayer)) irFovLayer.bringToFront();
        if (map.hasLayer(deviceMarker)) deviceMarker.bringToFront();

    });

}



// ---- QWebChannel 桥接 ----

var bridge = null;

new QWebChannel(qt.webChannelTransport, function(channel) {

    bridge = channel.objects.bridge;
    
    if (bridge && bridge.onMapInitialized) {
    
        bridge.onMapInitialized();
    
    }

});



// ======================================================================

// ---- C++ 调用的 JS API ----

// ======================================================================



function jsSetDevicePos(lat, lon) {

    var ll = [lat, lon];
    
    deviceMarker.setLatLng(ll);
    
    visCircle.setLatLng(ll);
    
    irCircle.setLatLng(ll);
    
    if (!map.hasLayer(visCircle)) { visCircle.addTo(map); irCircle.addTo(map); }

    if (!firstCentered) {

        map.setView(ll, map.getZoom());

        firstCentered = true;

    }

    reorderLayers();

}


function jsSetZoom(level) {

    map.setZoom(level);

}



function jsSetSatelliteMap() {

    if (currentLayer) map.removeLayer(currentLayer);
    
    satelliteLayer.addTo(map);
    
    currentLayer = satelliteLayer;

}



function jsSetStreetMap() {

    if (currentLayer) map.removeLayer(currentLayer);
    
    streetLayer.addTo(map);
    
    currentLayer = streetLayer;

}
    


// ---- 地图单击事件 ----

map.on('click', function(e) {

    if (bridge && bridge.onMapClick) {
    
        bridge.onMapClick(e.latlng.lat, e.latlng.lng);
    
    }

});

</script>

</body>

</html>
