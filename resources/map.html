<!DOCTYPE html>


<html>

<head>


<meta charset="utf-8"/>

<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<link rel="stylesheet" href="qrc:///leaflet.css"/>

<style>


* { margin:0; padding:0; outline:0; }

html, body { width:100%; height:100%; background:transparent !important; font-family:"Microsoft YaHei",sans-serif; }

#map { width:100%; height:100%; }

.minimap-style { border-radius: 50%; overflow: hidden; }

.deviceInfoContainer {
    background:rgba(0,0,0,0.55);
    backdrop-filter:blur(6px); -webkit-backdrop-filter:blur(6px);
    color:#eee;
    font-size:13px; line-height:1.7;
    padding:10px 14px;
    border-radius:6px;
    border:1px solid rgba(255,255,255,0.12);
    box-shadow:0 2px 12px rgba(0,0,0,0.4);
    min-width:220px;
    user-select:none;
}
.deviceInfoContainer .label { color:#999; }
.deviceInfoContainer .val  { color:#fff; font-weight:bold; }
.deviceInfoContainer .row  { white-space:nowrap; margin:2px 0; }
.deviceInfoContainer .title { font-size:11px; color:#888; letter-spacing:1px; margin-bottom:4px; text-transform:uppercase; }

</style>

</head>

<body>

<div id="map"></div>

<script src="qrc:///leaflet.js"></script>

<script src="qrc:///leaflet-semicircle.js"></script>

<script src="qrc:///qtwebchannel/qwebchannel.js"></script>

<script>

// ======================================================================
// ---- 全局常量 ----
// ======================================================================

var MAX_SEGMENTS = 200;     // 最大色段数，超出后裁剪旧段
var ARROW_INTERVAL = 10;    // 每 N 段加一个方向箭头

// ======================================================================

// ---- 地图初始化 ----

// ======================================================================

var map = L.map('map', {

    center: [0, 0],

    zoom: 13,

    zoomControl: false,

    attributionControl: false,

    preferCanvas: true,

    zoomAnimation: true,

    maxZoom: 18

});

// 地图缩放变化 → 通知 C++ 侧同步 SpinBox
map.on('zoomend', function() {
    if (typeof bridge !== 'undefined') {
        bridge.onMapZoomChanged(map.getZoom());
    }
});

// Leaflet 控件：设备信息悬浮面板
var DeviceInfoControl = L.Control.extend({
    onAdd: function() {
        var div = L.DomUtil.create('div', 'deviceInfoContainer');
        div.innerHTML = '<div class="title">设备信息</div>'
            + '<div class="row"><span class="label">经纬度: </span><span class="val" id="infoLatLon">--</span></div>'
            + '<div class="row"><span class="label">高度: </span><span class="val" id="infoAlt">--</span><span class="label"> 距离: </span><span class="val" id="infoRange">--</span></div>'
            + '<div class="row"><span class="label">方位角: </span><span class="val" id="infoPan">--</span><span class="label"> 俯仰角: </span><span class="val" id="infoTilt">--</span></div>'
            + '<div class="row"><span class="label">视场角(H×V): </span><span class="val" id="infoFov">--</span></div>';
        L.DomEvent.disableClickPropagation(div);
        return div;
    }
});
new DeviceInfoControl({ position: 'topleft' }).addTo(map);

function jsToggleDeviceInfo(visible) {
    var el = document.querySelector('.deviceInfoContainer');
    if (el) el.style.display = visible ? '' : 'none';
}

function jsSetMiniShape(lat, lon, zoom) {
    var el = document.getElementById('map');
    if (!el) return;
    el.classList.add('minimap-style');
    map.setView([lat, lon], zoom, {animate: false});
}
function jsSetFullShape() {
    var el = document.getElementById('map');
    if (!el) return;
    el.classList.remove('minimap-style');
}



// ======================================================================
// ---- 天地图图层初始化 ----
// ======================================================================

var TDT_KEY = 'cb5396445b2686712e74750ad56190aa';
var tdtSubdomains = ['0', '1', '2', '3', '4', '5', '6', '7'];

// 四个独立瓦片图层
var vecTile = L.tileLayer('https://t{s}.tianditu.gov.cn/DataServer?T=vec_w&x={x}&y={y}&l={z}&tk=' + TDT_KEY, {
    maxZoom: 18, subdomains: tdtSubdomains, attribution: '© 天地图'
});
var cvaTile = L.tileLayer('https://t{s}.tianditu.gov.cn/DataServer?T=cva_w&x={x}&y={y}&l={z}&tk=' + TDT_KEY, {
    maxZoom: 18, subdomains: tdtSubdomains
});
var imgTile = L.tileLayer('https://t{s}.tianditu.gov.cn/DataServer?T=img_w&x={x}&y={y}&l={z}&tk=' + TDT_KEY, {
    maxZoom: 18, subdomains: tdtSubdomains, attribution: '© 天地图'
});
var ciaTile = L.tileLayer('https://t{s}.tianditu.gov.cn/DataServer?T=cia_w&x={x}&y={y}&l={z}&tk=' + TDT_KEY, {
    maxZoom: 18, subdomains: tdtSubdomains
});

// 渲染模式：0=卫星, 1=卫星+批注, 2=路网, 3=路网+批注
var tdtMapMode = 1;

function applyTiles(mode) {
    map.removeLayer(vecTile);
    map.removeLayer(cvaTile);
    map.removeLayer(imgTile);
    map.removeLayer(ciaTile);
    if (mode == 0) {
        map.addLayer(imgTile);
    } else if (mode == 1) {
        map.addLayer(imgTile);
        map.addLayer(ciaTile);
    } else if (mode == 2) {
        map.addLayer(vecTile);
    } else if (mode == 3) {
        map.addLayer(vecTile);
        map.addLayer(cvaTile);
    }
}
applyTiles(tdtMapMode);



// 首次定位标记

var firstCentered = false;

// ---- 图层分组（从底到顶：track→fov→device→target） ----

var trackLayers = L.featureGroup().addTo(map);
var fovLayers = L.featureGroup().addTo(map);
var deviceLayers = L.featureGroup().addTo(map);
var targetLayers = L.featureGroup().addTo(map);



// ---- 设备位置标记 ----

// 【优化】废弃 L.marker，改用纯 Canvas 渲染的 L.circleMarker，保证缩放绝对同心

var deviceMarker = L.circleMarker([0, 0], {

    radius: 10,
    
    color: 'rgba(255,255,255,0.8)',
    
    weight: 2,
    
    fillColor: '#ff4444',
    
    fillOpacity: 1

}).addTo(deviceLayers);



// ---- 识别范围指示圆 ----

var visCircle = L.circle([0, 0], {

    radius: 4000,
    
    fillColor: '#3388ff',
    
    fillOpacity: 0.5,
    
    weight: 0

});



var irCircle = L.circle([0, 0], {

    radius: 2000,
    
    fillColor: '#ff4444',
    
    fillOpacity: 0.5,
    
    weight: 0

});



// ---- 视场角扇形（leaflet-semicircle） ----

var visFovLayer = L.semiCircle([0, 0], {

    radius: 0,

    startAngle: 0,

    stopAngle: 0,

    color: '#3388ff',

    fillColor: '#3388ff',

    fillOpacity: 0.4

});



var irFovLayer = L.semiCircle([0, 0], {

    radius: 0,

    startAngle: 0,

    stopAngle: 0,

    color: '#ff4444',

    fillColor: '#ff4444',

    fillOpacity: 0.4

});



// ---- 轨迹数据（每 trackId 独立存储色段、箭头、矢量线） ----

var trackData = {};



// ---- 目标容器 ----

// 【优化】改为字典结构，通过目标 ID 索引，大幅提升高频更新性能

var targetMarkers = {};

var targetBboxes = {};



// ---- 信息弹窗 ----

var infoPopup = null;








// ---- 图层叠放顺序辅助（rAF 去抖） ----

var _reorderPending = false;

function reorderLayers() {

    if (_reorderPending) return;

    _reorderPending = true;

    requestAnimationFrame(function() {

        _reorderPending = false;

        if (deviceLayers.hasLayer(visCircle)) visCircle.bringToFront();
        if (fovLayers.hasLayer(visFovLayer)) visFovLayer.bringToFront();
        if (deviceLayers.hasLayer(irCircle)) irCircle.bringToFront();
        if (fovLayers.hasLayer(irFovLayer)) irFovLayer.bringToFront();
        if (deviceLayers.hasLayer(deviceMarker)) deviceMarker.bringToFront();
        trackLayers.bringToFront();
        targetLayers.bringToFront();

    });

}



// ---- QWebChannel 桥接 ----

var bridge = null;

new QWebChannel(qt.webChannelTransport, function(channel) {

    bridge = channel.objects.bridge;
    
    if (bridge && bridge.onMapInitialized) {
    
        bridge.onMapInitialized();
    
    }

});



// ======================================================================

// ---- C++ 调用的 JS API ----

// ======================================================================



function jsSetDevicePos(lat, lon) {

    var ll = [lat, lon];
    
    deviceMarker.setLatLng(ll);
    
    visCircle.setLatLng(ll);
    
    irCircle.setLatLng(ll);
    
    if (!deviceLayers.hasLayer(visCircle)) { deviceLayers.addLayer(visCircle); deviceLayers.addLayer(irCircle); }

    if (!firstCentered) {

        map.setView(ll, map.getZoom());

        firstCentered = true;

    }

    reorderLayers();

}


function jsRecenterMap(lat, lon, zoom) {
    var ll = [lat, lon];
    map.setView(ll, zoom);
}


function jsSetZoom(level) {

    map.setZoom(level);

}



function jsSetSatelliteMap() {
    tdtMapMode = 1;
    applyTiles(1);
}

function jsSetStreetMap() {
    tdtMapMode = 3;
    applyTiles(3);
}

function jsSetDetailLevel(mode) {
    tdtMapMode = mode;
    applyTiles(mode);
}

function jsSetDeviceInfo(lat, lon, alt, pan, tilt, hfov, vfov, range, estimated) {

    document.getElementById('infoLatLon').textContent = lat.toFixed(5) + ', ' + lon.toFixed(5);

    document.getElementById('infoAlt').textContent = alt > 0 ? alt.toFixed(1) + ' m' : '--';

    var rangeText = '--';
    if (range > 0) {
        rangeText = range.toFixed(0) + ' m';
        if (estimated) rangeText += ' (估算)';
    }
    document.getElementById('infoRange').textContent = rangeText;

    document.getElementById('infoPan').textContent = pan.toFixed(1) + '\u00B0';

    document.getElementById('infoTilt').textContent = tilt.toFixed(1) + '\u00B0';

    if (hfov > 0 && vfov > 0)

        document.getElementById('infoFov').textContent = hfov.toFixed(1) + '\u00B0 \u00D7 ' + vfov.toFixed(1) + '\u00B0';

}


function jsSetVisFov(lat, lon, panDeg, tiltDeg, hfovDeg, vfovDeg, rangeM) {

    if (rangeM > 0 && hfovDeg > 0) {

        visFovLayer.setLatLng([lat, lon]);

        visFovLayer.setRadius(rangeM);

        visFovLayer.setDirection(panDeg, hfovDeg);

        if (!fovLayers.hasLayer(visFovLayer)) fovLayers.addLayer(visFovLayer);

        reorderLayers();

    } else {

        if (fovLayers.hasLayer(visFovLayer)) fovLayers.removeLayer(visFovLayer);

    }

}


function jsSetIrFov(lat, lon, panDeg, tiltDeg, hfovDeg, vfovDeg, rangeM) {

    if (rangeM > 0 && hfovDeg > 0) {

        irFovLayer.setLatLng([lat, lon]);

        irFovLayer.setRadius(rangeM);

        irFovLayer.setDirection(panDeg, hfovDeg);

        if (!fovLayers.hasLayer(irFovLayer)) fovLayers.addLayer(irFovLayer);

        reorderLayers();

    } else {

        if (fovLayers.hasLayer(irFovLayer)) fovLayers.removeLayer(irFovLayer);

    }

}


function jsClearFov() {

    if (fovLayers.hasLayer(visFovLayer)) fovLayers.removeLayer(visFovLayer);

    if (fovLayers.hasLayer(irFovLayer)) fovLayers.removeLayer(irFovLayer);

}


// ── 辅助函数 ──────────────────────────────────────────

function speedToColor(speed) {
    var t = Math.min(Math.max(speed / 5.0, 0), 1.0);
    var r, g, b;
    if (t < 0.5) {
        var s = t * 2;      // 0→1
        r = Math.round(255 * s);
        g = 255;
    } else {
        var s = (t - 0.5) * 2;
        r = 255;
        g = Math.round(255 * (1 - s));
    }
    return 'rgb(' + r + ',' + g + ',0)';
}

function bearing(lat1, lon1, lat2, lon2) {
    var dLon = (lon2 - lon1) * Math.PI / 180;
    var y = Math.sin(dLon) * Math.cos(lat2 * Math.PI / 180);
    var x = Math.cos(lat1 * Math.PI / 180) * Math.sin(lat2 * Math.PI / 180) -
            Math.sin(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.cos(dLon);
    return (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
}

// ── 轨迹点 ──────────────────────────────────────────

function jsAddTrackPoint(trackId, lat, lon, speed) {

    if (!trackData[trackId]) {
        trackData[trackId] = { prevLat: null, prevLon: null, segments: [], arrows: [], arrowCount: 0 };
    }

    var td = trackData[trackId];

    // 第一点：只存不画
    if (td.prevLat === null) {
        td.prevLat = lat;
        td.prevLon = lon;
        return;
    }

    // 色段：相邻两点连线，颜色按速度渐变
    var color = speedToColor(speed);
    var opacity = Math.max(0.25, 0.9 - td.segments.length * 0.0015);

    var seg = L.polyline([[td.prevLat, td.prevLon], [lat, lon]], {
        color: color, weight: 3, opacity: opacity,
        smoothFactor: 1.5, interactive: false
    }).addTo(trackLayers);

    td.segments.push(seg);

    // 方向箭头（每 ARROW_INTERVAL 段画一个三角形）
    td.arrowCount++;
    if (td.arrowCount % ARROW_INTERVAL === 0) {
        var midLat = (td.prevLat + lat) / 2;
        var midLon = (td.prevLon + lon) / 2;
        var brng = bearing(td.prevLat, td.prevLon, lat, lon);
        var aSize = 0.000075;
        var br = brng * Math.PI / 180;
        var tip = [midLat + aSize * 2 * Math.cos(br), midLon + aSize * 2 * Math.sin(br) / Math.cos(midLat * Math.PI / 180)];
        var bl = [midLat + aSize * Math.cos(br + 2.5), midLon + aSize * Math.sin(br + 2.5) / Math.cos(midLat * Math.PI / 180)];
        var br2 = [midLat + aSize * Math.cos(br - 2.5), midLon + aSize * Math.sin(br - 2.5) / Math.cos(midLat * Math.PI / 180)];
        var arrow = L.polygon([tip, bl, br2], {
            color: color, fillColor: color, fillOpacity: 0.8, weight: 1, interactive: false
        }).addTo(trackLayers);
        td.arrows.push(arrow);
    }

    td.prevLat = lat;
    td.prevLon = lon;

    // FIFO 裁剪
    while (td.segments.length > MAX_SEGMENTS) {
        trackLayers.removeLayer(td.segments.shift());
    }
    var maxArrows = Math.floor(MAX_SEGMENTS / ARROW_INTERVAL) + 5;
    while (td.arrows.length > maxArrows) {
        trackLayers.removeLayer(td.arrows.shift());
    }
}


function jsClearTrack(trackId) {

    if (trackData[trackId]) {
        trackData[trackId].segments.forEach(function(s) { trackLayers.removeLayer(s); });
        trackData[trackId].arrows.forEach(function(a) { trackLayers.removeLayer(a); });
        delete trackData[trackId];
    }

}


function jsClearAllTracks() {

    Object.keys(trackData).forEach(function(id) { jsClearTrack(id); });

    trackData = {};

}

function buildContent(t) {
    var h = '<div><b>' + (t.id || '') + '</b></div>' +
            '<div>Dist: ' + (t.dist > 0 ? t.dist.toFixed(1) + 'm' : '-') + '</div>' +
            '<div>Speed: ' + (t.speed || 0).toFixed(1) + ' m/s</div>';
    if (t.bbox) h += '<div>BBox: ' + t.bbox.length + ' pts</div>';
    return h;
}


function jsUpdateTargets(jsonStr) {

    var arr = JSON.parse(jsonStr);

    var currentIds = {};

    arr.forEach(function(t) {

        var ll = [t.lat, t.lon];

        var markerColor = '#44aaff';                // 跟踪点始终蓝色不透明
        var color = t.locked ? '#00ff00' : '#ff4444'; // BBox 保持绿/红区分锁定

        currentIds[t.id] = true;

        if (targetMarkers[t.id]) {

            targetMarkers[t.id].setLatLng(ll);

            targetMarkers[t.id].setStyle({ fillColor: markerColor });

            targetMarkers[t.id]._targetDist = t.dist;

            targetMarkers[t.id]._targetCls = t.cls;

            targetMarkers[t.id]._targetSpeed = t.speed || 0;

            if (targetMarkers[t.id].isPopupOpen()) {
                targetMarkers[t.id].setPopupContent(buildContent(t));
            }

        } else {

            var m = L.circleMarker(ll, {

                radius: 10, fillColor: markerColor, fillOpacity: 1.0, color: '#fff', weight: 1

            }).addTo(targetLayers).bringToFront();

            m._targetId = t.id;

            m._targetCls = t.cls;

            m._targetDist = t.dist;

            m._targetSpeed = t.speed || 0;

            m.bindPopup(buildContent(t), { offset: [0, -10] });

            targetMarkers[t.id] = m;

        }

        if (t.bbox && t.bbox.length >= 4) {

            var valid = t.bbox.filter(function(p) { return p[0] !== 0 && p[1] !== 0; });

            if (valid.length >= 3) {

                if (targetBboxes[t.id]) {

                    targetBboxes[t.id].setLatLngs(valid);

                    targetBboxes[t.id].setStyle({ fillColor: color });

                } else {

                    targetBboxes[t.id] = L.polygon(valid, { fillColor: color, fillOpacity: 0.5, weight: 1 }).addTo(targetLayers);

                }

            }

        }

    });

    Object.keys(targetMarkers).forEach(function(id) {

        if (!currentIds[id]) {

            targetLayers.removeLayer(targetMarkers[id]);

            delete targetMarkers[id];

            if (targetBboxes[id]) {

                targetLayers.removeLayer(targetBboxes[id]);

                delete targetBboxes[id];

            }

            if (trackData[id]) jsClearTrack(id);

        }

    });

}


// ---- 地图点击事件 ----

map.on('click', function(e) {

    if (bridge && bridge.onMapClick) {
    
        bridge.onMapClick(e.latlng.lat, e.latlng.lng);
    
    }

});

// ---- 地图双击事件：请求放大 ----

map.on('dblclick', function(e) {
    L.DomEvent.stopPropagation(e);
    if (bridge && bridge.onRequestEnlarge) {
        bridge.onRequestEnlarge();
    }
});

</script>

</body>

</html>
